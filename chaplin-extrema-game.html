@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111013;--surface:#17161A;--border:#28262C;
  --text:#E8E4DC;--muted:#5A5760;--dim:#333038;
  --accent:#FF5C3A;--accent2:#5B9CF6;--green:#3EC97A;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;align-items:center;justify-content:center;position:relative}

/* Top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--border);
  background:var(--surface);
}
.logo{font-size:13px;letter-spacing:0.05em;color:var(--muted)}
.logo em{font-style:normal;color:var(--accent)}
#step-counter{font-size:11px;color:var(--muted);letter-spacing:0.08em;font-family:'IBM Plex Mono',monospace}

/* Canvas area */
#canvas-wrap{
  position:relative;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
}
#glyph-canvas{display:block;cursor:crosshair}

/* Bottom bar */
#bottombar{
  position:absolute;bottom:0;left:0;right:0;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-top:1px solid var(--border);
  background:var(--surface);
}
#letter-label{font-size:28px;font-family:'Chaplin',serif;color:var(--text);line-height:1;margin-right:16px}
#instructions{font-size:11px;color:var(--muted);letter-spacing:0.04em;flex:1}
#action-btn{
  padding:9px 22px;border-radius:4px;border:none;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  text-transform:uppercase;letter-spacing:0.1em;font-weight:500;
  transition:all 0.15s;
}
#action-btn.check{background:var(--accent2);color:#fff}
#action-btn.check:hover{background:#4a8ae0}
#action-btn.next{background:var(--accent);color:#fff}
#action-btn.next:hover{background:#e84d2a}
#action-btn.finish{background:var(--green);color:#111}
#action-btn.finish:hover{background:#30b368}

/* Coord readout */
#coord-readout{
  position:absolute;bottom:60px;right:0;
  font-size:10px;color:var(--muted);letter-spacing:0.06em;
  padding:4px 10px;
}

/* Score screen */
#score-screen{
  position:absolute;inset:0;background:var(--bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:0;z-index:50;
}
#score-screen.show{display:flex}
.sc-title{font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);margin-bottom:24px}
.sc-big{font-size:96px;font-weight:300;letter-spacing:-0.04em;color:var(--text);line-height:1;margin-bottom:4px}
.sc-sub{font-size:13px;color:var(--muted);margin-bottom:48px}
.sc-breakdown{display:flex;flex-direction:column;gap:6px;margin-bottom:48px;min-width:260px}
.sc-row{display:flex;align-items:center;gap:12px;padding:8px 14px;border-radius:5px;background:var(--surface);border:1px solid var(--border)}
.sc-char{font-family:'Chaplin',serif;font-size:24px;width:28px;text-align:center;line-height:1}
.sc-bar-wrap{flex:1;height:3px;background:var(--dim);border-radius:2px;overflow:hidden}
.sc-bar{height:100%;border-radius:2px;transition:width 0.6s ease;background:var(--green)}
.sc-pts{font-size:11px;color:var(--muted);min-width:40px;text-align:right}
.sc-restart{
  padding:10px 28px;border-radius:4px;background:var(--accent);color:#fff;
  border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;
  font-size:11px;text-transform:uppercase;letter-spacing:0.1em;
  transition:all 0.15s;
}
.sc-restart:hover{background:#e84d2a}

/* Click marker ripple */
@keyframes rippleAnim{0%{transform:scale(0.3);opacity:1}100%{transform:scale(2.5);opacity:0}}
/* Reveal pulse */
@keyframes revealPulse{0%{opacity:0;transform:scale(0.5)}60%{opacity:1;transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="logo">Point Extrema — A Letter Drawing Game</span>
    <div id="step-counter"></div>
    <div style="width:120px"></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="glyph-canvas"></canvas>
    <div id="coord-readout"></div>
  </div>

  <div id="bottombar">
    <span id="letter-label">a</span>
    <span id="instructions">Click to place extrema points, then press Done.</span>
    <button id="action-btn" class="action-btn check">Done</button>
  </div>

  <!-- Score screen -->
  <div id="score-screen">
    <div class="sc-title">Round Complete</div>
    <div class="sc-big" id="sc-big-num">0</div>
    <div class="sc-sub" id="sc-sub-text">Keep practicing</div>
    <div class="sc-breakdown" id="sc-breakdown"></div>
    <button class="sc-restart" id="sc-restart-btn">Play Again</button>
  </div>

const LETTERS = 'abcdefghijklmnopqrstuvwxyz'.split('');

const ROUND_SIZE = 5;

let W, H, SCALE, OX, OY;

const canvas = document.getElementById('glyph-canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

function du2px(x,y){ return {cx: OX+x*SCALE, cy: OY-y*SCALE}; }
function px2du(cx,cy){ return {x:(cx-OX)/SCALE, y:(OY-cy)/SCALE}; }

function setupCanvas() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const topH = 48, botH = 60;
  const avail = vh - topH - botH - 16;
  const size = Math.min(vw * 0.94, avail, 900);
  canvas.width = size; canvas.height = size;
  wrap.style.width = size+'px'; wrap.style.height = size+'px';
  W = size; H = size;
  const pad = 24;
  SCALE = Math.min((W-pad*2)/780, (H-pad*2)/1000);
  OX = (W-780*SCALE)/2;
  OY = H/2 + 250*SCALE;
}

function initSession() {
  // Pick 5 random letters
  const shuffled = [...LETTERS].sort(()=>Math.random()-0.5);
  session = { letters: shuffled.slice(0,5), idx:0, clicks:[], revealed:false, roundScores:[], totalPts:0 };
  document.getElementById('score-screen').classList.remove('show');
  updateDots();
  updateLabel();
  setInstructions('Click to place extrema points, then press Done.');
  setBtn('check');
  draw();
}

function currentGlyph(){ return GLYPHS[session.letters[session.idx]]; }
function currentLetter(){ return session.letters[session.idx]; }

function updateDots() {
  document.getElementById('step-counter').textContent = `${session.idx + 1} / ${session.letters.length}`;
}

function updateLabel() {
  document.getElementById('letter-label').textContent = currentLetter();
}

function setInstructions(txt) {
  document.getElementById('instructions').textContent = txt;
}

function setBtn(state) {
  const btn = document.getElementById('action-btn');
  if (state==='check') { btn.textContent='Done'; btn.className='action-btn check'; }
  else if (state==='next') { btn.textContent='Next →'; btn.className='action-btn next'; }
  else if (state==='finish') { btn.textContent='See Score'; btn.className='action-btn finish'; }
}

  ctx.clearRect(0,0,W,H);

  drawPath(currentGlyph().segments);

  ctx.closePath();
  ctx.fillStyle='rgba(232,228,220,0.07)';
  ctx.fill('evenodd');
  ctx.strokeStyle='rgba(232,228,220,0.92)';
  ctx.lineWidth=1.8; ctx.lineJoin='round'; ctx.stroke();
  ctx.restore();
}

function drawClicks() {
  session.clicks.forEach(c => {
    const {cx,cy}=du2px(c.x,c.y);
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,92,58,0.9)'; ctx.fill();
    ctx.restore();
  });
}

function drawReveal() {
  const g = currentGlyph();
  const targets = g.extrema;
  const matched = session.matchedTargets || new Set();

  // on-curve points — small hollow diamonds
  g.oncurve.forEach(p => {
    const {cx,cy}=du2px(p.x,p.y);
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(Math.PI/4);
    ctx.strokeStyle='rgba(91,156,246,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(-3.5,-3.5,7,7);
    ctx.restore();
  });

  // extrema targets — plain dots only
  targets.forEach((t,ti) => {
    const {cx,cy}=du2px(t.x,t.y);
    const isMatched = matched.has(ti);
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
    ctx.fillStyle = isMatched ? 'rgba(62,201,122,0.9)' : 'rgba(255,92,58,0.9)';
    ctx.fill();
    ctx.restore();
  });

  // user clicks — plain dots
  session.clicks.forEach(c => {
    const {cx,cy}=du2px(c.x,c.y);
    const isHit = c.matchIdx !== undefined;
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,3.5,0,Math.PI*2);
    ctx.fillStyle = isHit ? 'rgba(62,201,122,0.6)' : 'rgba(255,92,58,0.35)';
    ctx.fill();
    ctx.restore();
  });
}

// ── Click handler ──
canvas.addEventListener('mousemove', e => {
  if(session.revealed) return;
  const r=canvas.getBoundingClientRect();
  const du=px2du(e.clientX-r.left, e.clientY-r.top);
  document.getElementById('coord-readout').textContent=`${Math.round(du.x)}, ${Math.round(du.y)}`;
});
canvas.addEventListener('mouseleave',()=>{ document.getElementById('coord-readout').textContent=''; });

canvas.addEventListener('click', e => {
  if(session.revealed) return;
  const r=canvas.getBoundingClientRect();
  const du=px2du(e.clientX-r.left, e.clientY-r.top);
  session.clicks.push({x:du.x, y:du.y});
  setInstructions(`${session.clicks.length} point${session.clicks.length!==1?'s':''} placed — press Done when ready.`);
  draw();
});


// ── Score logic ──
function scoreClicks() {
  const targets = currentGlyph().extrema;
  const usedClicks = new Set();
  const matched = new Set();

  targets.forEach((t,ti) => {
    let bestDist=TOL+1, bestCi=-1;
    session.clicks.forEach((c,ci) => {
      if(usedClicks.has(ci)) return;
      const d=Math.hypot(c.x-t.x, c.y-t.y);
      if(d<=TOL && d<bestDist){ bestDist=d; bestCi=ci; }
    });
    if(bestCi>=0){
      session.clicks[bestCi].matchIdx=ti;
      session.clicks[bestCi].dist=Math.round(bestDist);
      usedClicks.add(bestCi);
      matched.add(ti);
    }
  });

  session.matchedTargets = matched;
  const pts = Math.round((matched.size / targets.length) * 100);
  session.roundScores.push({ letter: currentLetter(), pts, found: matched.size, total: targets.length });
  session.totalPts += pts;
  return pts;
}

// ── Action button ──
document.getElementById('action-btn').addEventListener('click', () => {
  const btn = document.getElementById('action-btn');
  if(btn.className.includes('check')) {
    // Reveal
    scoreClicks();
    session.revealed = true;
    draw();
    const last = session.roundScores[session.roundScores.length-1];
    setInstructions(`${last.found}/${last.total} extrema found.`);
    const isLast = session.idx === session.letters.length - 1;
    setBtn(isLast ? 'finish' : 'next');
  } else if(btn.className.includes('next')) {
    session.idx++;
    session.clicks = [];
    session.revealed = false;
    session.matchedTargets = null;
    updateDots();
    updateLabel();
    setInstructions('Click to place extrema points, then press Done.');
    setBtn('check');
    draw();
  } else if(btn.className.includes('finish')) {
    showScore();
  }
});

function showScore() {
  const screen = document.getElementById('score-screen');
  screen.classList.add('show');
  
  const avg = Math.round(session.totalPts / ROUND_SIZE);
  document.getElementById('sc-big-num').textContent = avg;
  document.getElementById('sc-sub-text').textContent = avg===100?'Perfect!': avg>=80?'Excellent':avg>=60?'Good work':'Keep practicing';

  const bd = document.getElementById('sc-breakdown');
  bd.innerHTML = '';
  session.roundScores.forEach(r => {
    const row = document.createElement('div');
    row.className = 'sc-row';
    const pct = r.pts;
    row.innerHTML = `
      <span class="sc-char">${r.letter}</span>
      <div class="sc-bar-wrap"><div class="sc-bar" style="width:0%;background:${pct>=80?'var(--green)':pct>=50?'var(--accent2)':'var(--accent)'}"></div></div>
      <span class="sc-pts">${r.found}/${r.total}</span>
    `;
    bd.appendChild(row);
    setTimeout(()=>{ row.querySelector('.sc-bar').style.width=pct+'%'; }, 80);
  });
}

document.getElementById('sc-restart-btn').addEventListener('click', initSession);

setupCanvas();
initSession();
window.addEventListener('resize', () => { setupCanvas(); draw(); });
</script>
